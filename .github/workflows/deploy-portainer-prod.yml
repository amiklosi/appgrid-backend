name: Deploy to Portainer (Production)

on:
  push:
    branches:
      - production
  workflow_dispatch: # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=prod
            type=sha,prefix=production-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Portainer
        env:
          PORTAINER_URL: ${{ vars.PORTAINER_URL }}
          PORTAINER_ACCESS_TOKEN: ${{ secrets.PORTAINER_ACCESS_TOKEN }}
          PORTAINER_STACK_NAME: ${{ vars.PORTAINER_STACK_NAME }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
          REVENUECAT_PROJECT_ID: ${{ secrets.REVENUECAT_PROJECT_ID }}
          PADDLE_API_KEY: ${{ secrets.PADDLE_API_KEY }}
          PADDLE_WEBHOOK_SECRET: ${{ secrets.PADDLE_WEBHOOK_SECRET }}
          AXIOM_TOKEN: ${{ secrets.AXIOM_TOKEN }}
          AXIOM_DATASET: ${{ secrets.AXIOM_DATASET }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: |
          # Get Portainer endpoint ID
          ENDPOINT_ID=$(curl -s -H "X-API-Key: ${PORTAINER_ACCESS_TOKEN}" \
            "${PORTAINER_URL}/api/endpoints" | jq -r '.[0].Id')

          echo "Using Portainer endpoint: ${ENDPOINT_ID}"

          # Check if stack exists
          STACK_ID=$(curl -s -H "X-API-Key: ${PORTAINER_ACCESS_TOKEN}" \
            "${PORTAINER_URL}/api/stacks" | \
            jq -r ".[] | select(.Name==\"${PORTAINER_STACK_NAME}\") | .Id")

          # Build env array and payload as a file to avoid heredoc issues
          jq -n \
            --arg name "${PORTAINER_STACK_NAME}" \
            --rawfile compose docker-compose.prod.yml \
            --arg pg "${POSTGRES_PASSWORD}" \
            --arg mgKey "${MAILGUN_API_KEY}" \
            --arg mgDomain "${MAILGUN_DOMAIN}" \
            --arg rcKey "${REVENUECAT_API_KEY}" \
            --arg rcProject "${REVENUECAT_PROJECT_ID}" \
            --arg paddleKey "${PADDLE_API_KEY}" \
            --arg paddleSecret "${PADDLE_WEBHOOK_SECRET}" \
            --arg axiomToken "${AXIOM_TOKEN}" \
            --arg axiomDataset "${AXIOM_DATASET}" \
            --arg posthogKey "${POSTHOG_API_KEY}" \
            '{
              name: $name,
              stackFileContent: $compose,
              env: [
                {name: "POSTGRES_PASSWORD", value: $pg},
                {name: "MAILGUN_API_KEY", value: $mgKey},
                {name: "MAILGUN_DOMAIN", value: $mgDomain},
                {name: "REVENUECAT_API_KEY", value: $rcKey},
                {name: "REVENUECAT_PROJECT_ID", value: $rcProject},
                {name: "PADDLE_API_KEY", value: $paddleKey},
                {name: "PADDLE_WEBHOOK_SECRET", value: $paddleSecret},
                {name: "AXIOM_TOKEN", value: $axiomToken},
                {name: "AXIOM_DATASET", value: $axiomDataset},
                {name: "POSTHOG_API_KEY", value: $posthogKey}
              ]
            }' > /tmp/stack-payload.json

          if [ -z "$STACK_ID" ]; then
            echo "Creating new stack: ${PORTAINER_STACK_NAME}"

            curl -X POST "${PORTAINER_URL}/api/stacks/create/standalone/string?endpointId=${ENDPOINT_ID}" \
              -H "X-API-Key: ${PORTAINER_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d @/tmp/stack-payload.json

            echo "Stack created successfully"
          else
            echo "Updating existing stack: ${PORTAINER_STACK_NAME} (ID: ${STACK_ID})"

            # Add update-specific fields
            jq '. + {prune: false, pullImage: true} | del(.name)' /tmp/stack-payload.json > /tmp/stack-update.json

            curl -X PUT "${PORTAINER_URL}/api/stacks/${STACK_ID}?endpointId=${ENDPOINT_ID}" \
              -H "X-API-Key: ${PORTAINER_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d @/tmp/stack-update.json

            echo "Stack updated successfully"
          fi

          # Wait for deployment
          sleep 10

          # Check stack status
          curl -s -H "X-API-Key: ${PORTAINER_ACCESS_TOKEN}" \
            "${PORTAINER_URL}/api/stacks" | \
            jq ".[] | select(.Name==\"${PORTAINER_STACK_NAME}\")"

      - name: Verify deployment
        env:
          PORTAINER_URL: ${{ vars.PORTAINER_URL }}
          PORTAINER_ACCESS_TOKEN: ${{ secrets.PORTAINER_ACCESS_TOKEN }}
          PORTAINER_STACK_NAME: ${{ vars.PORTAINER_STACK_NAME }}
        run: |
          echo "Waiting for services to be healthy..."
          sleep 30

          # Get stack info
          STACK_INFO=$(curl -s -H "X-API-Key: ${PORTAINER_ACCESS_TOKEN}" \
            "${PORTAINER_URL}/api/stacks" | \
            jq ".[] | select(.Name==\"${PORTAINER_STACK_NAME}\")")

          if [ -n "$STACK_INFO" ]; then
            echo "Stack deployed successfully!"
            echo "$STACK_INFO" | jq .
          else
            echo "Stack deployment verification failed"
            exit 1
          fi
